<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI แยกเพศและวัย - น้องนำทาง (Local Model)</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; }
        #header { padding: 15px; text-align: center; background: #333; width: 100%; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .video-wrapper { position: relative; width: 640px; height: 480px; margin-top: 20px; border: 4px solid #444; border-radius: 10px; overflow: hidden; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #status { color: #00ff00; margin-top: 10px; font-weight: bold; font-size: 18px; }
        .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid #00ff00; border-radius: 50%; width: 50px; height: 50px; animation: spin 2s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading" class="loading">
    <div class="loader"></div>
    <h2 id="loadMsg">กำลังเชื่อมต่อสมองกลน้องนำทาง...</h2>
    <p id="loadDetail">กำลังดึงไฟล์จาก GitHub (models/)</p>
</div>

<div id="header">
    <strong>ระบบวิเคราะห์บุคคล (ชาย/หญิง/เด็ก/ผู้ใหญ่)</strong>
    <div id="status">เตรียมความพร้อม...</div>
</div>

<div class="video-wrapper">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusText = document.getElementById('status');
    const loading = document.getElementById('loading');
    const loadDetail = document.getElementById('loadDetail');

    async function init() {
        // 🔗 ชี้ไปที่ Repository 'model' ของพี่โดยตรง
        const MODEL_URL = 'https://taiyang12300.github.io/model/'; 
        
        try {
            // โหลดทีละตัวเพื่อความเสถียรและรายงานสถานะได้แม่นยำ
            loadDetail.innerText = "กำลังโหลดระบบตรวจจับใบหน้า... (1/3)";
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            
            loadDetail.innerText = "กำลังโหลดระบบวิเคราะห์อายุและเพศ... (2/3)";
            await faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL);
            
            loadDetail.innerText = "กำลังโหลดระบบวิเคราะห์พิกัดอวัยวะ... (3/3)";
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);

            loading.style.display = 'none';
            statusText.innerText = "สมองกลพร้อม! เริ่มการวิเคราะห์";
            startVideo();
        } catch (e) {
            console.error("Critical Error:", e);
            document.getElementById('loadMsg').innerText = "❌ โหลดไฟล์ไม่สำเร็จ";
            loadDetail.innerText = "โปรดเช็คชื่อไฟล์ใน GitHub: " + e.message;
            statusText.innerText = "เกิดข้อผิดพลาดในการเชื่อมต่อโมเดล";
        }
    }

    function startVideo() {
        navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
            .then(stream => {
                video.srcObject = stream;
                video.onplay = () => {
                    const displaySize = { width: video.videoWidth, height: video.videoHeight };
                    faceapi.matchDimensions(canvas, displaySize);
                    
                    setInterval(async () => {
                        // ปรับพารามิเตอร์ให้สมดุลกับความเร็วของตู้ Kiosk
                        const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 160, scoreThreshold: 0.5 }))
                            .withFaceLandmarks()
                            .withAgeAndGender();

                        const resizedDetections = faceapi.resizeResults(detections, displaySize);
                        const ctx = canvas.getContext('2d');
                        ctx.clearRect(0, 0, canvas.width, canvas.height);

                        resizedDetections.forEach(result => {
                            const { age, gender } = result;
                            const box = result.detection.box;

                            // สรุปกลุ่มช่วงวัย
                            let ageGroup = "ผู้ใหญ่";
                            if (age < 15) ageGroup = "เด็ก";
                            else if (age > 55) ageGroup = "ผู้สูงอายุ";

                            let genderTh = (gender === 'male') ? "ชาย" : "หญิง";
                            
                            // 🎨 วาดกรอบ (ชายฟ้า หญิงชมพู)
                            ctx.strokeStyle = (gender === 'male') ? "#00CAFF" : "#FF69B4";
                            ctx.lineWidth = 4;
                            ctx.strokeRect(box.x, box.y, box.width, box.height);

                            // 📝 แสดงข้อความ (เน้นตัวใหญ่ให้อ่านง่ายที่หน้าตู้)
                            ctx.fillStyle = "yellow";
                            ctx.font = "bold 24px Arial";
                            const label = `${genderTh} - ${ageGroup} (${Math.round(age)} ปี)`;
                            ctx.fillText(label, box.x, box.y > 30 ? box.y - 10 : 30);
                            
                            // พ่นค่า Log เพื่อดูความแม่นยำหน้าตู้
                            console.log(`🎯 Scan: ${genderTh}, Group: ${ageGroup}, CX: ${Math.round(box.x + (box.width/2))}`);
                        });
                    }, 500); // ประมวลผลทุก 0.5 วินาที
                };
            })
            .catch(err => statusText.innerText = "เปิดกล้องไม่ได้: " + err);
    }

    init();
</script>
</body>
</html>
