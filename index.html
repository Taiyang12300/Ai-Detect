<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Debug Mode - น้องนำทาง</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; }
        #header { padding: 15px; text-align: center; background: #222; width: 100%; border-bottom: 2px solid #444; }
        .video-wrapper { position: relative; width: 640px; height: 480px; margin-top: 20px; border: 5px solid #333; border-radius: 8px; overflow: hidden; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #status { color: #00ff00; margin-top: 10px; font-weight: bold; font-size: 1.2em; }
        .loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; }
    </style>
</head>
<body>

<div id="loading" class="loading-screen">
    <h2>กำลังเตรียมสมองกล... (Debug Mode)</h2>
    <p id="progress">กำลังดึงข้อมูลจากระบบ GitHub...</p>
</div>

<div id="header">
    <strong>ระบบทดสอบวิเคราะห์บุคคล + เช็คค่า Confidence/W/CX</strong>
    <div id="status">รอโหลดข้อมูล...</div>
</div>

<div class="video-wrapper">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusText = document.getElementById('status');
    const loadingScreen = document.getElementById('loading');
    const progressText = document.getElementById('progress');

    window.onload = async () => {
        if (typeof faceapi === 'undefined') {
            progressText.innerText = "❌ โหลดระบบไม่สำเร็จ โปรดตรวจสอบการเชื่อมต่ออินเทอร์เน็ต";
            return;
        }
        init();
    };

    async function init() {
        const MODEL_URL = 'https://taiyang12300.github.io/model/'; 
        
        try {
            progressText.innerText = "กำลังโหลดระบบตรวจจับใบหน้า... (1/3)";
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            await faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);

            loadingScreen.style.display = 'none';
            statusText.innerText = "ระบบพร้อมทำงาน! จดค่าตัวเลขบนหน้าจอไปจูนน้องนำทาง";
            startVideo();
        } catch (e) {
            console.error(e);
            progressText.innerHTML = "❌ พบข้อผิดพลาดในการโหลดโมเดล";
        }
    }

    function startVideo() {
        navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
            .then(stream => {
                video.srcObject = stream;
                video.onplay = () => {
                    const displaySize = { width: video.videoWidth, height: video.videoHeight };
                    faceapi.matchDimensions(canvas, displaySize);
                    
                    setInterval(async () => {
                        const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                            .withAgeAndGender();

                        const resizedDetections = faceapi.resizeResults(detections, displaySize);
                        const ctx = canvas.getContext('2d');
                        ctx.clearRect(0, 0, canvas.width, canvas.height);

                        resizedDetections.forEach(result => {
                            const { gender } = result;
                            const box = result.detection.box;
                            const score = result.detection.score; // ค่าความมั่นใจ 0-1

                            // --- การคำนวณค่า Debug ---
                            const confidence = (score * 100).toFixed(0); // แปลงเป็น %
                            const W = Math.round(box.width); // ความกว้างใบหน้า
                            const CX = Math.round(box.x + (box.width / 2)); // จุดกึ่งกลางหน้า
                            
                            let genderThai = (gender === 'male') ? "ชาย" : "หญิง";
                            
                            // 1. วาดกรอบสี่เหลี่ยม
                            ctx.strokeStyle = (gender === 'male') ? "#00CAFF" : "#FF69B4";
                            ctx.lineWidth = 4;
                            ctx.strokeRect(box.x, box.y, box.width, box.height);

                            // 2. วาดพื้นหลังแถบข้อมูล (เพื่อให้เห็นตัวเลขชัด)
                            ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                            ctx.fillRect(box.x, box.y - 100, 160, 95);

                            // 3. แสดงค่าความมั่นใจ (Confidence)
                            ctx.fillStyle = confidence > 70 ? "#00ff00" : "#ffcc00"; // เขียวถ้าแม่นยำสูง
                            ctx.font = "bold 20px Arial";
                            ctx.fillText(`CONF: ${confidence}%`, box.x + 10, box.y - 70);

                            // 4. แสดงค่า CX และ W
                            ctx.fillStyle = "white";
                            ctx.font = "16px Arial";
                            ctx.fillText(`CX: ${CX}`, box.x + 10, box.y - 45);
                            ctx.fillText(`W: ${W}`, box.x + 10, box.y - 25);
                            
                            // 5. แสดงเพศ
                            ctx.fillStyle = "yellow";
                            ctx.font = "bold 18px Arial";
                            ctx.fillText(genderThai, box.x + 10, box.y - 5);
                        });
                    }, 200); // ปรับความเร็วเป็น 0.2 วินาทีเพื่อให้เลขวิ่งตามหน้าทัน
                };
            })
            .catch(err => statusText.innerText = "ไม่สามารถเปิดกล้องได้: " + err);
    }
</script>
</body>
</html>
