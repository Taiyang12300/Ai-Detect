<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI แยกเพศและวัย - น้องนำทาง</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; }
        #header { padding: 15px; text-align: center; background: #333; width: 100%; }
        .video-wrapper { position: relative; width: 640px; height: 480px; margin-top: 20px; border: 4px solid #444; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #status { color: #00ff00; margin-top: 10px; font-weight: bold; }
        .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="loading" class="loading"><h2>กำลังโหลดสมองกลแยกเพศ/วัย...</h2></div>

<div id="header">
    <strong>ระบบทดสอบวิเคราะห์บุคคล (ชาย/หญิง/เด็ก/คนแก่)</strong>
    <div id="status">เตรียมความพร้อม...</div>
</div>

<div class="video-wrapper">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusText = document.getElementById('status');
    const loading = document.getElementById('loading');

    // 1. โหลดโมเดลทั้งหมดที่จำเป็น
    async function init() {
        const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
        
        await Promise.all([
            faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
            faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
            faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL),
            faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL)
        ]);

        loading.style.display = 'none';
        statusText.innerText = "โมเดลพร้อมแล้ว! เริ่มเปิดกล้อง...";
        startVideo();
    }

    // 2. เริ่มเปิดกล้อง
    function startVideo() {
        navigator.mediaDevices.getUserMedia({ video: {} })
            .then(stream => {
                video.srcObject = stream;
                video.onplay = () => {
                    const displaySize = { width: video.videoWidth, height: video.videoHeight };
                    faceapi.matchDimensions(canvas, displaySize);
                    
                    setInterval(async () => {
                        // 3. ตรวจจับและวิเคราะห์
                        const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                            .withFaceLandmarks()
                            .withAgeAndGender();

                        const resizedDetections = faceapi.resizeResults(detections, displaySize);
                        const ctx = canvas.getContext('2d');
                        ctx.clearRect(0, 0, canvas.width, canvas.height);

                        resizedDetections.forEach(result => {
                            const { age, gender, genderProbability } = result;
                            const box = result.detection.box;

                            // แปลผลภาษาไทย
                            let ageLabel = Math.round(age);
                            let ageGroup = "ผู้ใหญ่";
                            if (age < 14) ageGroup = "เด็ก";
                            else if (age > 55) ageGroup = "ผู้สูงอายุ";

                            let genderTh = (gender === 'male') ? "ชาย" : "หญิง";
                            
                            // วาดกรอบ
                            ctx.strokeStyle = (gender === 'male') ? "#0099ff" : "#ff0099";
                            ctx.lineWidth = 3;
                            ctx.strokeRect(box.x, box.y, box.width, box.height);

                            // แสดงข้อความ
                            ctx.fillStyle = "white";
                            ctx.font = "bold 20px Arial";
                            const text = `${genderTh} (${ageGroup}) อายุประมาณ ${ageLabel}`;
                            ctx.fillText(text, box.x, box.y > 20 ? box.y - 10 : 20);

                            console.log(`🎯 ตรวจพบ: ${genderTh}, อายุ: ${ageLabel}, กลุ่ม: ${ageGroup}`);
                        });
                    }, 200); // ทำงานทุกๆ 0.2 วินาที
                };
            })
            .catch(err => statusText.innerText = "ไม่สามารถเปิดกล้องได้: " + err);
    }

    init();
</script>
</body>
</html>
