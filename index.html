<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI วิเคราะห์บุคคล - น้องนำทาง</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; }
        #header { padding: 15px; text-align: center; background: #222; width: 100%; border-bottom: 2px solid #444; }
        .video-wrapper { position: relative; width: 640px; height: 480px; margin-top: 20px; border: 5px solid #333; border-radius: 8px; overflow: hidden; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #status { color: #00ff00; margin-top: 10px; font-weight: bold; font-size: 1.2em; }
        .loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; }
    </style>
</head>
<body>

<div id="loading" class="loading-screen">
    <h2>กำลังเตรียมสมองกล...</h2>
    <p id="progress">กำลังดึงข้อมูลจากระบบ GitHub...</p>
</div>

<div id="header">
    <strong>ระบบทดสอบวิเคราะห์บุคคล (ชาย/หญิง/เด็ก/ผู้ใหญ่)</strong>
    <div id="status">รอโหลดข้อมูล...</div>
</div>

<div class="video-wrapper">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusText = document.getElementById('status');
    const loadingScreen = document.getElementById('loading');
    const progressText = document.getElementById('progress');

    // ฟังก์ชันเริ่มการทำงานเมื่อหน้าจอโหลดเสร็จ
    window.onload = async () => {
        // ตรวจเช็คว่า faceapi โหลดมาหรือยัง เพื่อป้องกัน Error เหมือนในรูป 59324.jpg
        if (typeof faceapi === 'undefined') {
            progressText.innerText = "❌ โหลดระบบไม่สำเร็จ โปรดตรวจสอบการเชื่อมต่ออินเทอร์เน็ต";
            return;
        }
        init();
    };

    async function init() {
        // ดึงโมเดลจาก Repository ของพี่ที่เพิ่งอัปโหลดไฟล์ไป
        const MODEL_URL = 'https://taiyang12300.github.io/model/'; 
        
        try {
            progressText.innerText = "กำลังโหลดระบบตรวจจับใบหน้า... (1/3)";
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            
            progressText.innerText = "กำลังโหลดระบบวิเคราะห์ช่วงวัยและเพศ... (2/3)";
            await faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL);
            
            progressText.innerText = "กำลังโหลดพิกัด Landmarks... (3/3)";
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);

            loadingScreen.style.display = 'none';
            statusText.innerText = "ระบบพร้อมทำงาน! เริ่มการสแกน";
            startVideo();
        } catch (e) {
            console.error(e);
            progressText.innerHTML = "❌ พบข้อผิดพลาดในการโหลดโมเดล<br>โปรดเช็คชื่อไฟล์ใน GitHub";
        }
    }

    function startVideo() {
        navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
            .then(stream => {
                video.srcObject = stream;
                video.onplay = () => {
                    const displaySize = { width: video.videoWidth, height: video.videoHeight };
                    faceapi.matchDimensions(canvas, displaySize);
                    
                    setInterval(async () => {
                        // วิเคราะห์ใบหน้าเพื่อแยกเพศและอายุ
                        const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                            .withFaceLandmarks()
                            .withAgeAndGender();

                        const resizedDetections = faceapi.resizeResults(detections, displaySize);
                        const ctx = canvas.getContext('2d');
                        ctx.clearRect(0, 0, canvas.width, canvas.height);

                        resizedDetections.forEach(result => {
                            const { age, gender } = result;
                            const box = result.detection.box;

                            // จัดกลุ่มช่วงวัย
                            let group = age < 15 ? "เด็ก" : (age > 60 ? "ผู้สูงอายุ" : "ผู้ใหญ่");
                            let genderThai = (gender === 'male') ? "ชาย" : "หญิง";
                            
                            // วาดกรอบแยกตามเพศ (ชาย=ฟ้า, หญิง=ชมพู)
                            ctx.strokeStyle = (gender === 'male') ? "#00CAFF" : "#FF69B4";
                            ctx.lineWidth = 4;
                            ctx.strokeRect(box.x, box.y, box.width, box.height);

                            // แสดงผลบนหน้าจอ
                            ctx.fillStyle = "yellow";
                            ctx.font = "bold 24px Arial";
                            ctx.fillText(`${genderThai} - ${group}`, box.x, box.y - 10);
                        });
                    }, 500); // ทำงานทุกๆ 0.5 วินาทีเพื่อความลื่นไหล
                };
            })
            .catch(err => statusText.innerText = "ไม่สามารถเปิดกล้องได้: " + err);
    }
</script>
</body>
</html>
